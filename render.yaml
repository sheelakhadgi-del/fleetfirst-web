services:
  - type: web
    name: fleetfirst-leasing
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fleetfirst-db
          property: connectionString

databases:
  - name: fleetfirst-db
    plan: free
