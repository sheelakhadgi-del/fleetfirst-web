services:
  - type: web
    name: fleetfirst-leasing
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from run import app; from app.models import db; app.app_context().__enter__(); db.create_all(); print('DB tables created.')"
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fleetfirst-db
          property: connectionString

databases:
  - name: fleetfirst-db
    plan: free
