{% extends "base.html" %}
{% block title %}New Lease — {{ truck.truck_id }}{% endblock %}
{% block page_title %}New Lease — {{ truck.truck_id }} ({{ truck.description }}){% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<form method="POST">
  <div class="card mb-3">
    <div class="card-header">Lease Agreement Details</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Driver Name</label>
          <input type="text" name="driver_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Team Name <span class="text-muted" style="font-size:.75rem;">(CloudTrucks)</span></label>
          <input type="text" name="team_name" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Team ID <span class="text-muted" style="font-size:.75rem;">(UUID from Looker — used to match payments)</span></label>
          <input type="text" name="team_id" class="form-control" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        </div>
        <div class="col-md-6">
          <label class="form-label">First Payment Date <span class="text-danger">*</span></label>
          <input type="date" name="lease_start" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Term (months)</label>
          <input type="number" name="term_months" class="form-control" value="32" min="1">
        </div>
        <div class="col-md-4">
          <label class="form-label">Initial Balance ($) <span class="text-danger">*</span></label>
          <input type="number" name="initial_balance" class="form-control" step="0.01" required
            placeholder="60550.00">
        </div>
        <div class="col-md-4">
          <label class="form-label">Weekly Payment ($) <span class="text-danger">*</span></label>
          <input type="number" name="weekly_payment" class="form-control" step="0.01" required
            placeholder="1886.34">
        </div>
        <div class="col-md-4">
          <label class="form-label">Annual Rate</label>
          <input type="number" name="annual_rate" class="form-control" step="0.0001" value="0.1034">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea name="lease_notes" class="form-control" rows="2"></textarea>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">Create Lease</button>
    <a href="{{ url_for('trucks.detail', vin=truck.vin) }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
</div>
</div>
{% endblock %}
